name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  # ── Type checking ─────────────────────────────────────────────────────────
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  # ── Tests (auth-service + task-service run in parallel) ───────────────────
  test-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Cache mongodb-memory-server binaries to speed up subsequent runs
      - uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}
      - run: npm test -w apps/auth-service
        env:
          MONGOMS_PREFER_GLOBAL_PATH: 1
          MONGOMS_HOME: ~/.cache/mongodb-binaries

  test-task:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}
      - run: npm test -w apps/task-service
        env:
          MONGOMS_PREFER_GLOBAL_PATH: 1
          MONGOMS_HOME: ~/.cache/mongodb-binaries

  # ── Docker build & push to GHCR ───────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [typecheck, test-auth, test-task]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - name: gateway
            dockerfile: apps/gateway/Dockerfile
          - name: auth-service
            dockerfile: apps/auth-service/Dockerfile
          - name: task-service
            dockerfile: apps/task-service/Dockerfile
          - name: web
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/task-management/${{ matrix.service.name }}:latest
            ghcr.io/${{ github.repository_owner }}/task-management/${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
